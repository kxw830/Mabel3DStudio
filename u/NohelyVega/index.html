<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nohely Vega | Mabel3DStudio</title>
  <link rel="stylesheet" href="../../style.css" />
</head>
<body>
  <div class="container">
    
    <!-- Hero Card Section with background image -->
    

      <div class="profile-content">
        <!-- Profile Logo -->
        <div class="profile-logo-wrap">
          <img
            src="../../assets/mabel3dstudiologowhite.png"
            alt="Profile Image"
            class="profile-logo"
          />
        </div>

        <!-- Profile Name and Tagline -->
        <h1 class="profile-name">Nohely Vega</h1>

        <!-- Bio Section -->
        <p class="profile-tagline">Bridal Hair y Makeup Artist | Especialista en novias,eventos y XV | usAustin, TX/ servicio a domicillo | "Elegancia y romanticismo"</p>

        <!-- Profile Location -->
        <div class="profile-location">Austin, TX</div>

        <div class="badge-wrap">
          <div class="badge">Business</div>
        </div>
      </div>
    </div>

    <!-- Connect Section -->
    <h2 class="section-title">Connect</h2>

    <div class="action-list">
      <!-- Email Contact -->
      <a class="action-card" href="mailto:bynohelyvega@gmail.com">
        <div class="action-icon icon-email">✉</div>
        <div class="action-text">
          <span class="action-label">Email</span>
          <span class="action-subtext">bynohelyvega@gmail.com</span>
        </div>
      </a>

      <!-- Instagram Contact -->
      <a class="action-card" href="https://www.instagram.com/bynohelyvega" target="_blank">
        <div class="action-icon icon-instagram">◎</div>
        <div class="action-text">
          <span class="action-label">Instagram</span>
          <span class="action-subtext">@bynohelyvega</span>
        </div>
      </a>

      <!-- Website Contact -->
      <a class="action-card" href="https://api.whatsapp.com/send?phone=17372887874" target="_blank">
        <div class="action-icon icon-website">↗</div>
        <div class="action-text">
          <span class="action-label">Website</span>
          <span class="action-subtext">Visit site</span>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
