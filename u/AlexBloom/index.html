<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex Bloom | Mabel3DStudio</title>
  <link rel="stylesheet" href="../../style.css" />
</head>
<body>
  <div class="container">

    <div class="hero-card" style="background-image: url('../../assets/mabel3dstudiologowhite.png');">
      <div class="banner"></div>

      <div class="profile-content">
        <div class="profile-logo-wrap">
          <img
            src="../../assets/alexprofile-pic.jpg"
            alt="Mabel3DStudio logo"
            class="profile-logo"
          />
        </div>

        <h1 class="profile-name">Alex Bloom</h1>
        <p class="profile-tagline">Color Change and Commercial Vinyl Wraps • Paint Protection Film • Window Tint | (Financing available)</p>
        <div class="profile-location">3333 County Road 119 Suite 19, Hutto, Texas 78634</div>

        <div class="badge-wrap">
          <div class="badge">Business</div>
        </div>
      </div>
    </div>

    <h2 class="section-title">Connect</h2>

    <div class="action-list">
      <a class="action-card" href="mailto:abvinylwraps@gmail.com">
        <div class="action-icon icon-email">✉</div>
        <div class="action-text">
          <span class="action-label">Email</span>
          <span class="action-subtext">abvinylwraps@gmail.com</span>
        </div>
      </a>

      <a class="action-card" href="https://www.instagram.com/ab.wraps/" target="_blank">
        <div class="action-icon icon-instagram">◎</div>
        <div class="action-text">
          <span class="action-label">Instagram</span>
          <span class="action-subtext">@ab.wraps</span>
        </div>
      </a>

      <a class="action-card" href="https://www.abvinylwraps.com/" target="_blank">
        <div class="action-icon icon-website">↗</div>
        <div class="action-text">
          <span class="action-label">Website</span>
          <span class="action-subtext">https://www.abvinylwraps.com/</span>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
