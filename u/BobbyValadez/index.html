<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bobby Valadez | Mabel3DStudio</title>
  <link rel="stylesheet" href="../../style.css" />
</head>
<body>
  <div class="container">
    
    <!-- Hero Card Section -->
    <div class="hero-card">
      <div class="banner"></div>

      <div class="profile-content">
        <!-- Profile Logo -->
        <div class="profile-logo-wrap">
          <img
            src="../../assets/mabel3dstudiologowhite.png"
            alt="Mabel3DStudio logo"
            class="profile-logo"
          />
        </div>

        <!-- Profile Name and Tagline -->
        <h1 class="profile-name">Bobby Valadez</h1>
        <p class="profile-tagline">HI IM BOBBY!</p>

        <!-- Profile Location -->
        <div class="profile-location">Austin, Texas</div>

        <div class="badge-wrap">
          <div class="badge">Business</div>
        </div>
      </div>
    </div>

    <!-- Connect Section -->
    <h2 class="section-title">Connect</h2>

    <div class="action-list">
      <!-- Email Contact -->
      <a class="action-card" href="mailto:robertvaladez23@gmail.com">
        <div class="action-icon icon-email">✉</div>
        <div class="action-text">
          <span class="action-label">Email</span>
          <span class="action-subtext">robertvaladez23@gmail.com</span>
        </div>
      </a>

      <!-- Instagram Contact -->
      <a class="action-card" href="https://www.instagram.com/bushy_bob" target="_blank">
        <div class="action-icon icon-instagram">◎</div>
        <div class="action-text">
          <span class="action-label">Instagram</span>
          <span class="action-subtext">@bugguybob</span>
        </div>
      </a>

      <!-- Website Contact -->
      <a class="action-card" href="https://d1qy6n5ihufgyw.cloudfront.net" target="_blank">
        <div class="action-icon icon-website">↗</div>
        <div class="action-text">
          <span class="action-label">Website</span>
          <span class="action-subtext">Visit site</span>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
